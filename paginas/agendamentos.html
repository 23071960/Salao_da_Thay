<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento - Salão da Thay</title>
  <link rel="stylesheet" href="../styles/agendamentos.css" />
</head>
<body>
  <main class="form-container">
    <h1>Agendar Horário</h1>
    
    <!-- Seção para exibir os dados do cliente -->
    <div id="cliente-info" class="cliente-info">
      <h3>Dados do Cliente</h3>
      <p><strong>Nome:</strong> <span id="cliente-nome"></span></p>
      <p><strong>Telefone:</strong> <span id="cliente-telefone"></span></p>
    </div>

    <form id="form-agendamento">
      <!-- Campo oculto para o ID do cliente -->
      <input type="hidden" id="cliente_id" name="cliente_id">
      
      <label for="servico_id">Serviço:</label>
      <select id="servico_id" name="servico_id" required>
        <option value="">Selecione um serviço</option>
        <!-- Os serviços serão carregados dinamicamente pelo JavaScript -->
      </select>

      <label for="data_consulta">Data:</label>
      <input type="date" id="data_consulta" name="data_consulta" required />

      <label for="hora_inicio">Hora:</label>
      <input type="time" id="hora_inicio" name="hora_inicio" required />

      <label for="valor_cobrado">Valor (R$):</label>
      <input type="number" id="valor_cobrado" name="valor_cobrado" step="0.01" min="0" required>

      <label for="forma_pagamento">Forma de Pagamento:</label>
      <select id="forma_pagamento" name="forma_pagamento" required>
        <option value="">Selecione</option>
        <option value="dinheiro">Dinheiro</option>
        <option value="cartao">Cartão</option>
        <option value="pix">PIX</option>
      </select>

      <label for="observacoes">Observações:</label>
      <textarea id="observacoes" name="observacoes" rows="3"></textarea>

      <button type="submit">Confirmar Agendamento</button>
    </form>
    <a href="/paginas/pesquisa.html" class="btn-voltar">← Voltar à Pesquisa</a>
  </main>

  <!-- Scripts na ordem correta -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/supabase.js"></script>
  <script src="/scripts/mascaras.js"></script>
  <script src="/scripts/agendamento.js"></script>
</body>
</html>
